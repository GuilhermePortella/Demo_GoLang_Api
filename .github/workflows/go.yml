name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tutoriais_web/test/go.mod
          cache: true
          cache-dependency-path: |
            **/go.mod
            **/go.sum

      - name: Show Go version
        run: go version

      - name: Set up Bun
        if: ${{ hashFiles('package.json') != '' }}
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Build Bun app
        if: ${{ hashFiles('package.json') != '' }}
        run: bun run build

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r modfile; do
            module_dir="$(dirname "$modfile")"
            echo "::group::go build ${module_dir}"
            build_dir="${RUNNER_TEMP:-/tmp}/go-build"
            mkdir -p "$build_dir"
            (cd "$module_dir" && go build -o "$build_dir" ./...)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path './.git/*' | sort)

      - name: Test
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r modfile; do
            module_dir="$(dirname "$modfile")"
            echo "::group::go test ${module_dir}"
            (cd "$module_dir" && go test ./...)
            echo "::endgroup::"
          done < <(find . -name go.mod -not -path './.git/*' | sort)
