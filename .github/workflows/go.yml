name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Set up Bun
        if: ${{ hashFiles('package.json') != '' }}
        uses: oven-sh/setup-bun@v2

      - name: Install Bun dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Build Bun app
        if: ${{ hashFiles('package.json') != '' }}
        run: bun run build

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
